syntax = "proto3";
package refract.kvstream;

enum ValueType {
  FLOAT32 = 0;
  FLOAT64 = 1;
  INT8 = 2;
  INT16 = 3;
  INT32 = 4;
  INT64 = 5;
  UINT8 = 6;
  UINT16 = 7;
  UINT32 = 8;
  UINT64 = 9;
}

message ColumnDef {
  string name = 1;
  ValueType value_type = 2;
}

message RegisterTable {
  uint32 table_id = 1;
  string name = 2;
  repeated ColumnDef columns = 3;
}

message TableRow {
  uint32 table_id = 1;
  bytes values = 2;   // concatenated raw bytes for all columns in registration order
}

message StreamMessage {
  oneof payload {
    RegisterTable register_table = 1;
    TableRow table_row = 2;
  }
}

message StreamResponse {
  bool ok = 1;
  string error = 2;
}

service KVStream {
  rpc Stream (stream StreamMessage) returns (StreamResponse);
}
